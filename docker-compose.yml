services:
  poweradmin:
    build: .
    ports:
      - "${POWERADMIN_PORT:-8080}:8080"
    environment:
      POWERADMIN_SECRET_KEY: "${SECRET_KEY:-change-this-to-a-random-secret}"
      POWERADMIN_DATABASE_PATH: "/data/poweradmin.db"
      POWERADMIN_DEFAULT_ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
    volumes:
      - app-data:/data
    restart: unless-stopped

volumes:
  app-data:
